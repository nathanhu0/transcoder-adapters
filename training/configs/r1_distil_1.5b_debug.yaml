# Debug config — same as r1_distil_7b but stops after 50 steps
model_name: "Qwen/Qwen2.5-Math-1.5B"
run_name_prefix: "r1_distil_1.5b_debug"

transcoder:
  n_features: 8192
  dec_bias: true
  l1_weight: 0.001

bridging:
  reference_model_path: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
  backbone: "target"
  loss_type: "kl"
  n_cutoffs: 1
  sampling: "uniform"
  always_include_adapt_only: true
  lambda_bridge: 2.0
  lambda_nmse: 1

dataset_type: "open_thoughts"
dataset:
  data_path: "/nlp/scr/nathu/sparse-adaptation/data/openthoughts/stratified_n55000_t10000_s42_train.jsonl"
  val_data_path: "/nlp/scr/nathu/sparse-adaptation/data/openthoughts/stratified_n55000_t10000_s42_val.jsonl"
  data_format: "deepseek"
max_seq_length: 10000
length_excession_behavior: "truncate"
loss_on_prompt: true

batch_size: 1
micro_batch_size: 1
learning_rate: 8e-4
num_epochs: 1
warmup_ratio: 0.05

use_wandb: false
debug_mode: true
