# Direct fine-tuning: base model + transcoder adapters, LM loss only
model_name: "Qwen/Qwen2.5-Math-7B"
run_name_prefix: "direct_ft_7b"

transcoder:
  n_features: 8192
  dec_bias: false
  l1_weight: 0.001

direct:
  reference_model_path: "deepseek-ai/DeepSeek-R1-Distill-Qwen-7B"
  copied_tokens: ["<think>", "</think>"]

# Data settings
dataset_type: "open_thoughts"
dataset:
  data_path: "hf://nathu0/transcoder-adapters-openthoughts3-stratified-55k/data/train.jsonl"
  val_data_path: "hf://nathu0/transcoder-adapters-openthoughts3-stratified-55k/data/val.jsonl"
  data_format: "qwen"
  max_seq_length: 10000
length_excession_behavior: "truncate"
loss_on_prompt: false

batch_size: 1
micro_batch_size: 1
learning_rate: 8e-4
num_epochs: 1
warmup_ratio: 0.05

use_wandb: true
