# Debug config for Gemma2 2B with transcoder adapters
model_name: "google/gemma-2-2b"
model_arch: "gemma2"
run_name_prefix: "gemma2_2b_debug"

transcoder:
  n_features: 8192
  dec_bias: true
  l1_weight: 0.001

bridging:
  reference_model_path: "google/gemma-2-2b-it"
  backbone: "target"
  loss_type: "kl"
  n_cutoffs: 1
  sampling: "uniform"
  always_include_adapt_only: true
  lambda_bridge: 2.0
  lambda_nmse: 1

data_path: "hf://nathu0/transcoder-adapters-openthoughts3-stratified-55k/data/train.jsonl"
val_data_path: "hf://nathu0/transcoder-adapters-openthoughts3-stratified-55k/data/val.jsonl"
max_seq_length: 10000
data_format: "deepseek"
truncate: true
loss_on_prompt: true

batch_size: 1
micro_batch_size: 1
learning_rate: 8e-4
num_epochs: 1
warmup_ratio: 0.05

use_wandb: false
debug_mode: true
